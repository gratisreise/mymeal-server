spring:
  application:
    name: mymeal-server

  # MessageSource for validation messages
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  # JPA + Spring Data JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Spring Batch
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  # Task Scheduling (Virtual Thread Executor)
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: async-task-

  # Spring Security (JWT-based)
  security:
    filter:
      order: 10
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      embedding:
        options:
          model: text-embedding-3-small
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash

# SpringDoc OpenAPI 2.x
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.mymealserver
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# File Upload (Meal Photos, Profile Images)
spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB

# OAuth 2.0 Configuration
oauth:
  redirect-uris:
    - http://localhost:3000/oauth/callback
    - http://localhost:8080/oauth/callback
    - https://mymeal.app/oauth/callback
