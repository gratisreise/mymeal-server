spring:
  application:
    name: mymeal-server

  # JPA + Spring Data JPA
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Spring Batch
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  # Task Scheduling (Virtual Thread Executor)
  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 8
        max-size: 16
        queue-capacity: 100
      thread-name-prefix: async-task-

  # Spring Security (JWT-based)
  security:
    filter:
      order: 10

# SpringDoc OpenAPI 2.x
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.mymealserver
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# Logging (pattern only)
logging:
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n'

# Server
server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  shutdown: graceful

# File Upload (Meal Photos, Profile Images)
spring.servlet.multipart:
  enabled: true
  max-file-size: 10MB
  max-request-size: 10MB
