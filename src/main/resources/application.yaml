spring:
  application:
    name: mymeal-server
  profiles:
    active: local

  # Jackson
  jackson:
    date-format: yyyy-MM-dd
    serialization:
      write-dates-as-timestamps: false

  # MessageSource
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  # Batch
  batch:
    job:
      enabled: false
      name: recommendationGenerationJob
    jdbc:
      initialize-schema: always

  # Virtual Thread
  threads:
    virtual:
      enabled: true

  # Task Scheduling
  task:
    scheduling:
      pool:
        size: 4

  cloud:
    aws:
      region:
        static: ap-northeast-2
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      s3:
        bucket-name: mymeal-bucket


  # File Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  # Spring AI
  ai:
    google:
      genai:
        project-id: ${GOOGLE_PROJECT_ID}
        api-key: ${GOOGLE_GENAI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
        embedding:
          project-id: ${GOOGLE_PROJECT_ID}
          api-key: ${GOOGLE_GENAI_API_KEY}
          text:
            options:
              model: gemini-embedding-001

# OAuth2
oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:dummy}
    client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
    token-url: https://oauth2.googleapis.com/token
    user-info-url: https://www.googleapis.com/oauth2/v2/userinfo
    redirect-uri: ${OAUTH_REDIRECT_URI}
  naver:
    client-id: ${NAVER_CLIENT_ID:dummy}
    client-secret: ${NAVER_CLIENT_SECRET:dummy}
    token-url: https://nid.naver.com/oauth2.0/token
    user-info-url: https://openapi.naver.com/v1/nid/me
    redirect-uri: ${OAUTH_REDIRECT_URI}
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    token-url: https://kauth.kakao.com/oauth/token
    user-info-url: https://kapi.kakao.com/v2/user/me
    redirect-uri: ${OAUTH_REDIRECT_URI}

# Firebase
fcm:
  key-path: classpath:mymeal-fcm-key.json

# JWT
jwt:
  access-secret: ${JWT_ACCESS_SECRET}
  refresh-secret: ${JWT_REFRESH_SECRET}
  access_expiration: 3600000
  refresh-expiration: 604800000