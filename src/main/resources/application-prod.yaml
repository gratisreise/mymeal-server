# Production
spring:

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_batch_fetch_size: 100
    open-in-view: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      connect-timeout: 5000ms
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 5
          max-wait: 1000ms

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, prometheus, info
      base-path: /manage-actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    env:
      show-values: never
