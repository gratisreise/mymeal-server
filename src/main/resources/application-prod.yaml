spring:
  profiles:
    group:
      prod: prod

  # DataSource (PostgreSQL 15+)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA (prod: SQL LOGGING disabled)
  jpa:
    properties:
      hibernate:
        show_sql: false

  # Redis (7+)
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: -1ms

# AWS Configuration (prod: environment variables)
aws:
  region: ${AWS_REGION}
  s3:
    bucket: ${AWS_S3_BUCKET}
    endpoint: ${AWS_S3_ENDPOINT}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
  secrets-manager:
    enabled: true

# Firebase FCM (prod: environment variable)
firebase:
  service-account-key: ${FIREBASE_SERVICE_ACCOUNT_KEY}

# JWT (prod: environment variables)
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: ${JWT_ACCESS_EXPIRY:3600}  # 1 hour
  refresh-token-expiry: ${JWT_REFRESH_EXPIRY:1209600}  # 14 days

# Actuator (prod: health, metrics only)
management:
  endpoints:
    web:
      exposure:
        include: health,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never

# Logging (prod: INFO level)
logging:
  level:
    root: INFO
    com.mymealserver: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.batch: INFO
    org.hibernate.SQL: INFO

# Server (prod: environment variable)
server:
  port: ${SERVER_PORT:8080}

# Spring AI - OpenAI (Embeddings)
spring.ai.openai:
  api-key: ${OPENAI_API_KEY}
  embedding:
    options:
      model: text-embedding-3-small

# Spring AI - Vertex AI Gemini
spring.ai.vertex.ai:
  project-id: ${GCP_PROJECT_ID}
  location: ${GCP_LOCATION:asia-northeast3}
  gemini:
    api-key: ${GEMINI_API_KEY}
    chat:
      options:
        model: gemini-2.0-flash-exp

# Spring AI - pgvector Store
spring.ai.vectorstore.pgvector:
  index-type: HNSW
  dimension: 1536
  distance-type: COSINE_DISTANCE
  schema-name: public
