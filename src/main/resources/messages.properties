# ====================================================
# Validation Messages
# ====================================================

# ----------------------------------------------------
# 공통 검증 메시지 (Common Validation Messages)
# ----------------------------------------------------
validation.common.notblank={fieldName}은(는) 필수 항목입니다.
validation.common.notnull={fieldName}은(는) 필수 항목입니다.
validation.common.email=이메일 형식이 올바르지 않습니다.
validation.common.size.min={fieldName}은(는) 최소 {min}자 이상이어야 합니다.
validation.common.size.max={fieldName}은(는) 최대 {max}자 이내로 입력해야 합니다.
validation.common.range={fieldName}은(는) {min}~{max} 사이여야 합니다.

# ----------------------------------------------------
# 이메일 검증 (Email Validation)
# ----------------------------------------------------
validation.email.notblank=이메일은 필수 항목입니다.
validation.email.invalid=이메일 형식이 올바르지 않습니다.

# ----------------------------------------------------
# 비밀번호 검증 (Password Validation)
# ----------------------------------------------------
validation.password.notblank=비밀번호는 필수 항목입니다.
validation.password.size.min=비밀번호는 최소 8자 이상이어야 합니다.
validation.password.pattern=비밀번호는 영문, 숫자, 특수문자를 포함해야 합니다.

# ----------------------------------------------------
# 이름 검증 (Name Validation)
# ----------------------------------------------------
validation.name.notblank=이름은 필수 항목입니다.
validation.name.size.max=이름은 50자 이내로 입력해야 합니다.

# ----------------------------------------------------
# OAuth 토큰 검증 (OAuth Token Validation)
# ----------------------------------------------------
validation.oauth.token.notblank=OAuth 토큰은 필수 항목입니다.

# ----------------------------------------------------
# 리프레시 토큰 검증 (Refresh Token Validation)
# ----------------------------------------------------
validation.refreshtoken.notblank=리프레시 토큰은 필수 항목입니다.

# ----------------------------------------------------
# 탈퇴 사유 검증 (Withdrawal Reason Validation)
# ----------------------------------------------------
validation.withdraw.reason.notblank=탈퇴 사유는 필수 항목입니다.
validation.withdraw.reasonDetail.size.max=탈퇴 사유 상세는 500자 이내로 입력해야 합니다.

# ----------------------------------------------------
# 식사 관련 검증 (Meal Validation)
# ----------------------------------------------------
validation.meal.photo.notnull=식사 사진은 필수입니다.
validation.meal.mealType.notnull=식사 유형은 필수입니다.

# ----------------------------------------------------
# 반응 관련 검증 (Reaction Validation)
# ----------------------------------------------------
validation.reaction.digestionLevel.notnull=소화 상태는 필수입니다.
validation.reaction.digestionLevel.range=소화 상태는 1~5 사이여야 합니다.
validation.reaction.fullnessLevel.notnull=포만감은 필수입니다.
validation.reaction.fullnessLevel.range=포만감은 1~5 사이여야 합니다.
validation.reaction.energyLevel.notnull=에너지 레벨은 필수입니다.
validation.reaction.energyLevel.range=에너지 레벨은 1~5 사이여야 합니다.
