# Local Development

spring:

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  datasource: # 데이터베이스
    url: jdbc:postgresql://localhost:5432/mymeal
    username: postgres
    password: postgres

  data:
    redis:
      host: localhost
      port: 6379
      password: myredispassword
