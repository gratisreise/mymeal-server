services:

  db:
    image: pgvector/pgvector:pg16
    container_name: mymeal-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mymeal
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - mymeal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mymeal-network

  redis:
    image: redis:8-alpine
    container_name: mymeal-redis
    restart: always
    command: >
      redis-server
      --requirepass myredispassword
      --port 6379
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - mymeal-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "myredispassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mymeal-network

# 데이터 영속성을 위한 볼륨 정의
volumes:
  mymeal-postgres-data:
    driver: local
  mymeal-redis-data:
    driver: local

# 서비스 간 통신을 위한 네트워크 정의
networks:
  mymeal-network:
    driver: bridge